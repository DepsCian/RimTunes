name: Workshop Upload

on:
  release:
    types: [published]

env:
  APP_ID: "294100"
  PUBLISHED_FILE_ID: "3399705740"

jobs:
  workshop-upload:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Checkout mod
        uses: actions/checkout@v4

      - name: Verify mod structure
        run: |
          test -f About/About.xml || { echo "ERROR: About/About.xml missing"; exit 1; }
          test -f Assemblies/RimTunes.dll || { echo "ERROR: Assemblies/RimTunes.dll missing"; exit 1; }
          echo "Mod structure OK"

      - name: Convert release notes to BBCode
        id: bbcode
        run: |
          python3 <<'PYEOF'
          import re, os

          md = os.environ.get('RELEASE_BODY', '')
          md = md.replace('\r', '')

          md = re.sub(r'\[(.+?)\]\((.+?)\)', r'[url=\2]\1[/url]', md)
          md = re.sub(r'^### (.+)$', r'[h3]\1[/h3]', md, flags=re.M)
          md = re.sub(r'^## (.+)$', r'[h2]\1[/h2]', md, flags=re.M)
          md = re.sub(r'^# (.+)$', r'[h1]\1[/h1]', md, flags=re.M)
          md = re.sub(r'\*\*(.+?)\*\*', r'[b]\1[/b]', md)
          md = re.sub(r'\*(.+?)\*', r'[i]\1[/i]', md)

          lines = md.split('\n')
          out = []
          in_list = False
          for line in lines:
              if re.match(r'^- ', line):
                  if not in_list:
                      out.append('[list]')
                      in_list = True
                  out.append('[*]' + line[2:])
              else:
                  if in_list:
                      out.append('[/list]')
                      in_list = False
                  out.append(line)
          if in_list:
              out.append('[/list]')

          result = '\n'.join(out)
          assert result.strip(), "BBCode conversion produced empty output"

          sentinel = 'BBEOF_' + os.urandom(8).hex()
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'notes<<{sentinel}\n{result}\n{sentinel}\n')
          PYEOF
        env:
          RELEASE_BODY: ${{ github.event.release.body }}

      - name: Upload to Steam Workshop
        uses: m00nl1ght-dev/steam-workshop-deploy@v4
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          path: .
          appId: ${{ env.APP_ID }}
          publishedFileId: ${{ env.PUBLISHED_FILE_ID }}
          changeNote: ${{ steps.bbcode.outputs.notes }}
