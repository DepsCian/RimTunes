name: Workshop Upload

on:
  release:
    types: [published]

env:
  APP_ID: "294100"
  PUBLISHED_FILE_ID: "3399705740"

jobs:
  workshop-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mod
        uses: actions/checkout@v4

      - name: Verify mod structure
        run: |
          test -f About/About.xml || { echo "ERROR: About/About.xml missing"; exit 1; }
          test -f Assemblies/RimTunes.dll || { echo "ERROR: Assemblies/RimTunes.dll missing"; exit 1; }
          echo "Mod structure OK"

      - name: Upload to Steam Workshop
        uses: m00nl1ght-dev/steam-workshop-deploy@v4
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          path: .
          appId: ${{ env.APP_ID }}
          publishedFileId: ${{ env.PUBLISHED_FILE_ID }}
          changeNote: ${{ github.event.release.tag_name }}
